data:
  batch_size: 1
  crop_size: 224
  patch_size: 14
  num_workers: 1
  pin_mem: false
  root_path: ./data
  image_folder: images
  annotation_folder: annotations
  preserve_aspect_ratio: true
logging:
  folder: ./output
  write_tag: keypoint
keypoint:
  use_hm_loss: true
  hm_slots: 64
  tick_slots: 15
  hm_sigma: 2.0
  class_weights:
  - 0.05
  - 1.0
  - 1.0
meta:
  load_checkpoint: true
  model_name: vit_huge
  decoder_type: classic
  read_checkpoint: IN1K-vit.h.14-300e.pth.tar
  do_finetune: false
  finetune_epoch: 0
  use_bfloat16: true
optimization:
  epochs: 100
  final_lr: 1.0e-06
  final_weight_decay: 0.1
  ipe_scale: 1.0
  lr: 1.0e-03
  start_lr: 2.0e-04
  warmup: 3
  weight_decay: 0.04
