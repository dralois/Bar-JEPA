data:
  batch_size: 42
  color_jitter_strength: 0.0
  crop_scale:
  - 0.5
  - 1.0
  crop_size: 224
  num_workers: 10
  pin_mem: true
  root_path: /pfs/work9/workspace/scratch/ul_spm55-mydata-ssd/data/
  image_folder: images
  annotation_folder: annotations
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
  preserve_aspect_ratio: true
logging:
  folder: /pfs/work9/workspace/scratch/ul_spm55-mydata-ssd/output-arp/
  write_tag: jepa
mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 14
  pred_mask_scale:
  - 0.15
  - 0.2
meta:
  copy_data: false
  load_checkpoint: true
  model_name: vit_huge
  pred_depth: 12
  pred_emb_dim: 384
  read_checkpoint: ../checkpoints/IN1K-vit.h.14-300e.pth.tar
  checkpoint_epoch: 300
  do_finetune: true
  use_bfloat16: true
optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 50
  final_lr: 1e-06
  final_weight_decay: 0.04
  ipe_scale: 1.0
  lr: 5e-05
  start_lr: 5e-06
  warmup: 6
  weight_decay: 0.02
