data:
  batch_size: 20
  color_jitter_strength: 0.0
  crop_scale:
  - 0.5
  - 1.0
  crop_size: 224
  num_workers: 10
  pin_mem: true
  root_path: ./CTT
  is_ctt: true
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
  preserve_aspect_ratio: true
logging:
  folder: ./output_arp
  write_tag: jepa-ft
mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 14
  pred_mask_scale:
  - 0.15
  - 0.2
meta:
  load_checkpoint: true
  model_name: vit_huge
  pred_depth: 12
  pred_emb_dim: 384
  read_checkpoint: jepa-ep50.pth.tar
  checkpoint_epoch: 50
  do_finetune: true
  use_bfloat16: true
optimization:
  ema:
  - 0.996
  - 1.0
  epochs: 25
  final_lr: 5.0e-07
  final_weight_decay: 0.06
  ipe_scale: 1.0
  lr: 2.5e-05
  start_lr: 2.5e-06
  warmup: 3
  weight_decay: 0.03
