data:
  batch_size: 1
  crop_size: 224
  patch_size: 14
  num_workers: 1
  pin_mem: false
  root_path: ./data
  image_folder: images
  annotation_folder: annotations
  preserve_aspect_ratio: true
keypoint:
  max_keypoints: 64
  pnt_detect_thresh: 0.9
  cls_conf_thresh: 0.75
  eval_thresh: 1.5
meta:
  model_name: vit_huge
  decoder_type: classic
  read_checkpoint: ./output/kp-cl-arp-latest.pth.tar
  use_bfloat16: true