data:
  batch_size: 4
  color_jitter_strength: 0.0
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  patch_size: 14
  num_workers: 2
  pin_mem: false
  root_path: ./output
  image_folder: images
  annotation_folder: annotations
  preserve_aspect_ratio: true
logging:
  folder: ./logs
  write_tag: keypoint
keypoint:
  max_keypoints: 64
  pnt_detect_thresh: 0.9
  cls_conf_thresh: 0.75
  eval_thresh: 1.5
  class_weights:
  - 0.05
  - 1.0
  - 1.0
meta:
  load_checkpoint: false
  model_name: vit_tiny
  decoder_type: simple
  read_checkpoint: null
  checkpoint_epoch: 0
  do_finetune: false
  use_bfloat16: true
optimization:
  epochs: 70
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 0.001
  start_lr: 0.0002
  warmup: 3
  weight_decay: 0.04
