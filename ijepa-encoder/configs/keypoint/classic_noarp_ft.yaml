data:
  batch_size: 2048
  color_jitter_strength: 0.0
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  patch_size: 14
  num_workers: 12
  pin_mem: true
  root_path: ./data
  image_folder: images
  annotation_folder: annotations
  preserve_aspect_ratio: false
logging:
  folder: ./output
  write_tag: keypoint-classic-noarp
keypoint:
  max_keypoints: 64
  pnt_detect_thresh: 0.9
  cls_conf_thresh: 0.75
  eval_thresh: 1.5
  class_weights:
  - 0.05
  - 1.0
  - 1.0
  use_pts_loss: true
  use_align_loss: false
meta:
  load_checkpoint: true
  model_name: vit_huge
  decoder_type: classic
  read_checkpoint: keypoint-classic-noarp-ep25.pth.tar
  do_finetune: false
  finetune_epoch: 0
  use_bfloat16: true
optimization:
  epochs: 50
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 0.001
  start_lr: 0.0002
  warmup: 3
  weight_decay: 0.04